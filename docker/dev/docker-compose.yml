services:
  database:
    image: postgres:11.5
    environment:
      - POSTGRES_DB=judge
      - POSTGRES_USER=judge
      - POSTGRES_PASSWORD=${DATABASE_PASS}
    volumes:
      - pgdb:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    # Wait until Postgres actually accepts connections, not just until the
    # container starts, so dependents don't race the database on startup.
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U judge -d judge']
      interval: 3s
      timeout: 3s
      retries: 20
  api:
    build:
      context: ../..
      dockerfile: docker/dev/dockerfile
    # command: tail -f /dev/null
    command: >
      bash -c "npm start &
               /opt/environ/bin/python3 manage.py migrate &&
               /opt/environ/bin/python3 manage.py runserver 0.0.0.0:8000"
    volumes:
      - ../..:/code
      - varwww:/var/www/judge
      - problems:/problems
    ports:
      - '8000:8000'
    depends_on:
      database:
        condition: service_healthy
  grader:
    # The grader image installs an x86_64-only gcc toolchain (and PyPy/Mono),
    # so it must be built and run as linux/amd64 to match production. On arm64
    # hosts (Apple Silicon) this runs under emulation.
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: docker/common/dockerfile.grader
    command: bash -c "bash grader-firewall.sh && /opt/environ/bin/python3 manage.py grader"
    volumes:
      - ../..:/code
      - problems:/problems
    depends_on:
      database:
        condition: service_healthy
    cap_add:
      - NET_ADMIN
    ulimits:
      stack: -1

volumes:
  pgdb:
  problems:
  varwww:
